<header [class.scrolled]="isScrolled" class="header">
  <div class="container">
    <div class="header-content">
      <a routerLink="/" class="logo" style="display: flex; align-self: center; padding: 0.5rem;">
        <img src="assets/WEB_WonBVector.svg" alt="VisionTech.al" width="200" 
        >
      </a>

      <nav class="nav" [class.mobile-open]="isMobileMenuOpen">
        <ul class="nav-list">
          @for (link of navLinks; track link.path) {
            <li class="nav-item">
              <a
                [routerLink]="link.path"
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: link.path === '/' }"
                (click)="closeMobileMenu()"
                class="nav-link"
              >
                {{ link.label }}
              </a>
            </li>
          }
        </ul>
      </nav>

      <button
        class="mobile-menu-toggle"
        (click)="toggleMobileMenu()"
        [attr.aria-label]="isMobileMenuOpen ? 'Close menu' : 'Open menu'"
        [attr.aria-expanded]="isMobileMenuOpen"
      >
        <span [class.active]="isMobileMenuOpen" class="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
    </div>
  </div>
</header>
