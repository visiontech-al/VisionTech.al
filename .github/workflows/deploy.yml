name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main  # or master if your main branch is called master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Build Angular app
      run: ng build --configuration production --base-href /VisionTech.al/

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v6
      with:
        branch: gh-pages  # deploy target branch
        folder: dist/visiontech-frontend  
